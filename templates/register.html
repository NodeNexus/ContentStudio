<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Content Studio</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border-glass); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; text-align: center; }
    .auth-card h2 { margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--text-primary); }
    .auth-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.1); color: var(--text-primary); }
    .auth-btn { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #8b5cf6, #ec4899); border: none; border-radius: 0.5rem; color: #fff; font-weight: bold; cursor: pointer; margin-bottom: 1rem; }
    .auth-links a { color: #8b5cf6; text-decoration: none; font-size: 0.9rem; }
    .flash-error { color: #ec4899; font-size: 0.9rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Create an Account</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-error">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/register">
      <input type="text" name="username" class="auth-input" placeholder="Choose a Username" required />
      <input type="password" name="password" class="auth-input" placeholder="Create a Password" required />
      <button type="submit" class="auth-btn">Register</button>
    </form>
    <div class="auth-links">
      <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
  </div>
</body>
</html>
