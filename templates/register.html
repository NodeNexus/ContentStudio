<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Content Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
  <canvas id="particle-canvas"></canvas>
  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="auth-wrapper">
    <section class="auth-card glass">
      <div class="auth-logo">✦</div>
      <h1>Create Account</h1>
      <p>Set up your AI-native marketing cockpit in minutes.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-error">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/register">
        <input type="text" name="username" class="input" placeholder="Choose a username" required />
        <input type="password" name="password" class="input" placeholder="Create a password" required />
        <button type="submit" class="btn btn-primary auth-btn">Register</button>
      </form>

      <p class="auth-links">Already have an account? <a href="/login">Login here</a></p>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
