<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Content Studio</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
  <canvas id="particle-canvas"></canvas>
  <div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="auth-wrapper">
    <section class="auth-card glass">
      <div class="auth-logo">✦</div>
      <h1>Welcome Back</h1>
      <p>Access your autonomous AI marketing workspace.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-error">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="/login">
        <input type="text" name="username" class="input" placeholder="Username" required />
        <input type="password" name="password" class="input" placeholder="Password" required />
        <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
      </form>

      <p class="auth-links">Do not have an account? <a href="/register">Register here</a></p>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
