<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Content Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; overflow: hidden; }
    .auth-wrapper { z-index: 10; width: 100%; display: flex; justify-content: center; padding: 20px; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border-glass); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .auth-card h2 { margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--text-primary); font-size: 1.8rem; }
    .auth-input { width: 100%; padding: 0.9rem 1rem; margin-bottom: 1rem; border-radius: 0.5rem; border: 1px solid var(--border-glass); background: rgba(0,0,0,0.1); color: var(--text-primary); font-family: var(--font-body); font-size: 1rem; transition: var(--transition); }
    .auth-input:focus { outline: none; border-color: rgba(139, 92, 246, 0.8); background: rgba(0,0,0,0.15); }
    [data-theme="light"] .auth-input { background: rgba(255,255,255,0.5); }
    [data-theme="light"] .auth-input:focus { background: rgba(255,255,255,0.8); }
    .auth-btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #8b5cf6, #ec4899); border: none; border-radius: 0.5rem; color: #fff; font-weight: bold; cursor: pointer; margin-bottom: 1rem; font-size: 1rem; transition: var(--transition); }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    .auth-links a { color: #8b5cf6; text-decoration: none; font-weight: 500; transition: var(--transition); }
    .auth-links a:hover { color: #ec4899; }
    .flash-error { color: #ec4899; font-size: 0.9rem; margin-bottom: 1rem; background: rgba(236, 72, 153, 0.1); padding: 0.5rem; border-radius: 0.5rem; border: 1px solid rgba(236, 72, 153, 0.2); }
  </style>
</head>
<body>
  <!-- BACKGROUND -->
  <canvas id="particle-canvas"></canvas>
  <div class="bg-elements">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🎬</div>
      <h2>Content Studio</h2>
      <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Please log in to continue</p>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash-error">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      
      <form method="POST" action="/login">
        <input type="text" name="username" class="auth-input" placeholder="Username" required />
        <input type="password" name="password" class="auth-input" placeholder="Password" required />
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      
      <div class="auth-links">
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Don't have an account? <a href="/register">Register here</a></p>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
