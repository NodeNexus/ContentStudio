databases:
  - name: contentstudio-db
    plan: free
    databaseName: contentstudio
    user: contentstudio_user

services:
  - type: web
    name: content-studio
    runtime: python
    buildCommand: export CARGO_HOME=/opt/render/project/src/.cargo && pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: contentstudio-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
